<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام إدارة الدورات التدريبية</title>
<link rel="stylesheet" href="assets/shell.css" />
<link rel="stylesheet" href="assets/login.css" />
<link rel="stylesheet" href="assets/pages.css" />
<style>
  #appShell{display:none}
  .pg{display:none}.pg.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav a{cursor:pointer}
  table.tbl{width:100%;border-collapse:collapse;font-size:.86rem}
  table.tbl th{text-align:inherit;color:var(--muted);font-weight:700;font-size:.74rem;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl tbody tr:hover{background:rgba(28,114,147,.04)}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.74rem;font-weight:700}
  .av2{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--green-l),var(--green));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;margin-inline-end:8px}
  .cellname{display:flex;align-items:center}
  .rowacts{display:flex;gap:6px}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted)}
  .iconbtn:hover{color:var(--green);border-color:var(--green-l)} .iconbtn.danger:hover{color:#c0432e;border-color:#e6a99e}
  .iconbtn svg{width:15px;height:15px}
  .connbar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;margin-bottom:14px;font-size:.82rem;font-weight:700;background:rgba(28,114,147,.10);color:#1c7293;border:1px solid rgba(28,114,147,.28)}
  .connbar svg{width:15px;height:15px}
  .empty{text-align:center;color:var(--muted);padding:42px 16px}.empty svg{width:32px;height:32px;opacity:.45}
  .pager2{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:14px}
  .pgi{color:var(--muted);font-size:.82rem}.pgb{display:flex;gap:6px;flex-wrap:wrap}
  .pgn,.pgx{min-width:36px;height:36px;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;font-family:inherit;font-weight:700;font-size:.84rem;cursor:pointer;padding:0 10px}
  .pgn.active{background:var(--green);border-color:var(--green);color:#fff}.pgx:disabled{opacity:.45}
  .backdrop{position:fixed;inset:0;background:rgba(11,19,43,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:18px}
  .modalcard{background:var(--card);color:var(--ink);border-radius:16px;width:min(600px,100%);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modalhd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700}
  .modalbody{padding:16px 18px;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .modalbody .full{grid-column:1/-1}
  .modalft{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
  .fld label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:5px}
  .fld input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font-family:var(--font)}
  .sk{height:46px;border-radius:10px;margin:8px 0;background:linear-gradient(90deg,#eef1f6 25%,#e2e7ef 37%,#eef1f6 63%);background-size:400% 100%;animation:shm 1.3s ease infinite}
  @keyframes shm{0%{background-position:100% 0}100%{background-position:-100% 0}}
  @media(max-width:560px){.modalbody{grid-template-columns:1fr}}
</style>
<!-- ====== خطوط + تحوّل بصري (Neon / Glassmorphism) — طبقة عرض فقط ====== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style id="neon-overhaul">
:root{
  --green:#22d3ee; --green-l:#43e7db; --green-d:#0ea5b7; --gold:#f0b866; --gold-d:#e0a24e;
  --bg:#070b18; --card:rgba(18,27,48,.55); --ink:#e9eefb; --muted:#93a6c6; --line:rgba(255,255,255,.09);
  --font:'Tajawal','Inter',system-ui,'Segoe UI',Tahoma,sans-serif;
  --neon:0 0 8px rgba(34,211,238,.55), 0 0 22px rgba(34,211,238,.28);
  --gbd:1px solid rgba(255,255,255,.10);
}
html,body{background:transparent;color:var(--ink);font-family:var(--font)}
body{
  background:
    radial-gradient(900px 500px at 12% -8%, rgba(34,211,238,.16), transparent 60%),
    radial-gradient(820px 520px at 100% 0%, rgba(167,139,250,.14), transparent 55%),
    radial-gradient(720px 620px at 50% 120%, rgba(240,184,102,.10), transparent 60%),
    linear-gradient(180deg,#070b18,#050812);
  background-attachment:fixed;min-height:100vh;
}
*{scrollbar-width:thin;scrollbar-color:rgba(34,211,238,.3) transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(34,211,238,.25);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes floatlogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* أسطح زجاجية */
.side,.top,.panel,.kpi,.gcard,.card,.tablewrap,.lg-card,.modalcard,.notifpanel,.statline .s,.connbar,.searchbox,.search{
  background:var(--card)!important;backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);
  border:var(--gbd)!important;
}
.app,.main,.content{background:transparent!important}

/* الشريط الجانبي */
.side{box-shadow:0 0 40px rgba(0,0,0,.45),inset -1px 0 0 rgba(34,211,238,.14)!important;border-radius:0 22px 22px 0!important}
.brandrow .t{color:var(--ink)!important;text-shadow:0 0 12px rgba(34,211,238,.25)}
.brandrow img,.lg-ring img,.lg-wm{filter:drop-shadow(0 0 10px rgba(34,211,238,.55))}
.nav a{color:var(--muted)!important;border-radius:12px;transition:all .25s ease}
.nav a:hover{color:var(--ink)!important;background:rgba(34,211,238,.08)!important;transform:translateX(-3px)}
.nav a.active{color:#fff!important;background:linear-gradient(90deg,rgba(34,211,238,.22),rgba(34,211,238,.04))!important;box-shadow:inset 2px 0 0 var(--green-l),0 0 18px rgba(34,211,238,.18)}
.nav a.active svg{filter:drop-shadow(0 0 6px rgba(34,211,238,.85))}
.lab{color:var(--muted)!important;letter-spacing:.5px}
.me{border-top:1px solid var(--line)!important}.nm{color:var(--ink)!important}.av{box-shadow:0 0 16px rgba(34,211,238,.45)}

/* الشريط العلوي */
.top{border-radius:16px!important;box-shadow:0 8px 30px rgba(0,0,0,.3)!important}
.ico,.pill{color:var(--muted)}.ico:hover{color:var(--green-l);text-shadow:var(--neon)}

/* العناوين بتوهّج */
.h h2,.lg-card h1{color:#fff!important;text-shadow:var(--neon);font-weight:800}
.h .sub,.lg-min,.mut{color:var(--muted)!important}.ph{color:var(--ink)!important;font-weight:700}

/* المؤشرات KPIs */
.kpis .kpi{border-radius:18px!important;overflow:hidden;animation:rise .5s ease both;transition:transform .3s,box-shadow .3s}
.kpi:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 28px rgba(34,211,238,.25)!important}
.kpi .v{color:#fff!important;text-shadow:var(--neon);font-weight:800}.kpi .l{color:var(--muted)!important}
.kpi .ic{color:var(--green-l);filter:drop-shadow(0 0 8px rgba(34,211,238,.5))}
.kpi.g2 .ic{color:#a78bfa;filter:drop-shadow(0 0 8px rgba(167,139,250,.5))}
.kpi.g3 .ic{color:var(--gold);filter:drop-shadow(0 0 8px rgba(240,184,102,.5))}
.kpi.g4 .ic{color:#f472b6;filter:drop-shadow(0 0 8px rgba(244,114,182,.5))}

/* البطاقات + الإحصاءات */
.panel,.gcard,.card{border-radius:18px!important;animation:rise .5s ease both}
.gcard{transition:.3s}.gcard:hover{transform:translateY(-3px);box-shadow:0 0 26px rgba(34,211,238,.2)!important}
.statline .s{border-radius:14px!important}.statline .s .v{color:#fff!important}.statline .s .si{color:var(--green-l)}

/* الأزرار */
.btnG,.lg-btn{background:linear-gradient(135deg,var(--green),var(--green-d))!important;color:#04121a!important;border:none!important;font-weight:800;box-shadow:0 0 18px rgba(34,211,238,.4);transition:.25s}
.btnG:hover,.lg-btn:hover{box-shadow:0 0 30px rgba(34,211,238,.7);transform:translateY(-2px)}
.btnGhost,.expbtn{background:rgba(255,255,255,.05)!important;color:var(--ink)!important;border:var(--gbd)!important;transition:.25s}
.btnGhost:hover,.expbtn:hover{border-color:var(--green-l)!important;color:var(--green-l)!important;box-shadow:0 0 14px rgba(34,211,238,.25)}
.iconbtn{background:rgba(255,255,255,.04)!important;border:var(--gbd)!important;color:var(--muted)!important;transition:.2s}
.iconbtn:hover{color:var(--green-l)!important;border-color:var(--green-l)!important;box-shadow:0 0 12px rgba(34,211,238,.3)}
.iconbtn.danger:hover{color:#ff7a6b!important;border-color:#ff7a6b!important;box-shadow:0 0 12px rgba(255,90,80,.35)}

/* الحقول */
input,select{color:var(--ink)!important}
.searchbox,.search{border-radius:12px!important}
.searchbox input::placeholder,.search input::placeholder{color:var(--muted)}
.fld input,.minp,.lg-field input{background:rgba(255,255,255,.05)!important;border:var(--gbd)!important;color:var(--ink)!important}
.fld input:focus,.minp:focus,.lg-field input:focus{border-color:var(--green-l)!important;box-shadow:0 0 0 3px rgba(34,211,238,.15)}

/* الجدول */
table.tbl th{color:var(--muted)!important;background:transparent!important;border-bottom:1px solid var(--line)!important}
table.tbl td{color:var(--ink);border-bottom:1px solid var(--line)!important}
table.tbl tbody tr{transition:.2s}
table.tbl tbody tr:hover{background:rgba(34,211,238,.06)!important;box-shadow:inset 0 0 0 1px rgba(34,211,238,.12)}
.av2{box-shadow:0 0 12px rgba(34,211,238,.5)}

/* الترقيم */
.pgn,.pgx,.pg-btn,.pg-num{background:rgba(255,255,255,.05)!important;border:var(--gbd)!important;color:var(--ink)!important}
.pgn.active,.pg-num.active{background:linear-gradient(135deg,var(--green),var(--green-d))!important;color:#04121a!important;border:none!important;box-shadow:0 0 14px rgba(34,211,238,.5)!important}

/* الرسوم الشريطية */
.track{background:rgba(255,255,255,.06)!important}.hbars .fill{box-shadow:0 0 12px rgba(34,211,238,.5)}

/* شريط الاتصال */
.connbar{color:var(--green-l)!important;background:rgba(34,211,238,.08)!important;border:1px solid rgba(34,211,238,.3)!important;text-shadow:0 0 6px rgba(34,211,238,.3)}

/* الدخول */
.lgp{background:transparent!important}
.lg-card{border-radius:22px!important;box-shadow:0 0 60px rgba(34,211,238,.15),0 20px 60px rgba(0,0,0,.5)!important;animation:rise .6s ease both}
.lg-ring{box-shadow:0 0 30px rgba(34,211,238,.5)!important;animation:floatlogo 4s ease-in-out infinite}
.lg-field{background:rgba(255,255,255,.05)!important;border:var(--gbd)!important}.lg-ic{color:var(--green-l)!important}.lg-lbl{color:var(--muted)!important}

/* المودال */
.backdrop{backdrop-filter:blur(6px)}
.modalcard{border-radius:20px!important;box-shadow:0 0 60px rgba(34,211,238,.15),0 30px 80px rgba(0,0,0,.6)!important;animation:rise .35s ease both}
.modalhd,.modalft{border-color:var(--line)!important}
</style>
<style id="neon-plus">
/* خلفية شفقية متحركة خلف كل شيء */
body::before{content:"";position:fixed;inset:-25%;z-index:-1;pointer-events:none;
  background:
    radial-gradient(600px 420px at 20% 30%, rgba(34,211,238,.12), transparent 60%),
    radial-gradient(620px 420px at 82% 18%, rgba(167,139,250,.11), transparent 60%),
    radial-gradient(640px 520px at 60% 92%, rgba(240,184,102,.09), transparent 60%);
  filter:blur(30px);animation:aurora 18s ease-in-out infinite alternate}
@keyframes aurora{0%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(2%,-2%,0) scale(1.08)}100%{transform:translate3d(-2%,2%,0) scale(1.05)}}

/* دخول متدرّج أنيق للبطاقات */
.kpis .kpi:nth-child(1){animation-delay:.03s}.kpis .kpi:nth-child(2){animation-delay:.10s}
.kpis .kpi:nth-child(3){animation-delay:.17s}.kpis .kpi:nth-child(4){animation-delay:.24s}
.grid2 .panel:nth-child(2){animation-delay:.12s}.grid3 .panel:nth-child(2){animation-delay:.12s}.grid3 .panel:nth-child(3){animation-delay:.2s}
.gcard:nth-child(2n){animation-delay:.07s}.gcard:nth-child(3n){animation-delay:.13s}

/* نبض نيون للقيم والعناصر النشطة */
@keyframes neonpulse{0%,100%{text-shadow:0 0 8px rgba(34,211,238,.5),0 0 20px rgba(34,211,238,.22)}50%{text-shadow:0 0 12px rgba(34,211,238,.78),0 0 30px rgba(34,211,238,.42)}}
.kpi .v{animation:rise .5s ease both, neonpulse 3.4s ease-in-out infinite}
.h h2{animation:neonpulse 4s ease-in-out infinite}
.nav a.active{animation:navglow 3s ease-in-out infinite}
@keyframes navglow{0%,100%{box-shadow:inset 2px 0 0 var(--green-l),0 0 14px rgba(34,211,238,.14)}50%{box-shadow:inset 2px 0 0 var(--green-l),0 0 24px rgba(34,211,238,.30)}}

/* لمعة انزلاقية على الأزرار عند المرور */
.btnG,.lg-btn{position:relative;overflow:hidden}
.btnG::after,.lg-btn::after{content:"";position:absolute;top:0;inset-inline-start:-60%;width:45%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg);transition:inset-inline-start .6s ease}
.btnG:hover::after,.lg-btn:hover::after{inset-inline-start:130%}

/* دخول ناعم عند تبديل الشاشات والصفوف */
.pg.active{animation:rise .45s ease both}
table.tbl tbody tr{animation:rise .4s ease both}
.brandrow img{animation:floatlogo 5s ease-in-out infinite}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lgp" id="login">
  <img class="lg-wm" src="assets/logo-white.png" alt>
  <div class="lg-wrap">
    <form class="lg-card" onsubmit="signIn(event)">
      <div class="lg-top">
        <div class="lg-ring"><img src="assets/logo-white.png" alt></div>
        <h1>نظام إدارة الدورات التدريبية</h1>
        <div class="lg-min">إعداد وتطوير القادة</div>
      </div>
      <label class="lg-lbl">البريد الإلكتروني</label>

      <label class="lg-lbl">كلمة المرور</label>
      <div class="lg-field"><span class="lg-ic" data-ic="lock"></span>
        <input type="password" id="pass" placeholder="••••••••" required></div>

      <div class="lg-err" id="loginErr" style="display:none"></div>

</div>

<div id="appShell"><div class="app" id="app">

      <a data-route="students" onclick="go('students')"><span data-ic="students"></span> <span class="nt">الطلاب</span></a>
      <a data-route="groups" onclick="go('groups')"><span data-ic="groups"></span> <span class="nt">المجموعات</span></a>
      <a data-route="trainers" onclick="go('trainers')"><span data-ic="trainers"></span> <span class="nt">المدرّبون</span></a>
      <a data-route="courses" onclick="go('courses')"><span data-ic="courses"></span> <span class="nt">الدورات</span></a>
      <div class="lab">أدوات</div>
      <a data-route="calendar" onclick="go('calendar')"><span data-ic="calendarFull"></span> <span class="nt">التقويم والانعقادات</span></a>
      <a data-route="reports" onclick="go('reports')"><span data-ic="chart"></span> <span class="nt">التقارير</span></a>
      <a data-route="printouts" onclick="go('printouts')"><span data-ic="printouts"></span> <span class="nt">المطبوعات</span></a>
      <a data-route="lookups" onclick="go('lookups')"><span data-ic="layers"></span> <span class="nt">القوائم والتصنيفات</span></a>
      <a data-route="search" onclick="go('search')"><span data-ic="search"></span> <span class="nt">البحث الشامل</span></a>
      <a data-route="users" onclick="go('users')"><span data-ic="users"></span> <span class="nt">المستخدمون</span></a>
      <a data-route="settings" onclick="go('settings')"><span data-ic="settings"></span> <span class="nt">الإعدادات</span></a>
    </nav>
    <div class="me"><div class="av"></div><div class="nm" id="meName">—<span id="meRole">مستخدم</span></div>
      <span style="margin-inline-start:auto;cursor:pointer;color:#9fb3a8;display:flex" title="خروج" onclick="signOut()"><span data-ic="login"></span></span></div>
  </aside>
  <main class="main">
    <header class="top">
      <div class="search" title="بحث"><span data-ic="search"></span><input id="topSearch" placeholder="ابحث في كل النظام..." onkeydown="if(event.key==='Enter'){go('search')}"></div>
      <div class="tools">
        <span class="ico" title="تبديل المظهر" onclick="toggleTheme()"><span data-ic="sun"></span></span>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div></div>

<div class="backdrop" id="backdrop"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

/* ===== المصادقة ===== */
document.addEventListener('DOMContentLoaded', async function(){
  paint(document);
  const { data:{ session } } = await sb.auth.getSession();
  if(session) enterApp(session); else showLogin();
  sb.auth.onAuthStateChange(function(_e,s){ if(!s) showLogin(); });
});
async function signIn(ev){
  ev.preventDefault();
  const b=document.getElementById('loginBtn'), er=document.getElementById('loginErr');
  er.style.display='none'; b.disabled=true;
  const { data, error } = await sb.auth.signInWithPassword({ email:document.getElementById('email').value.trim(), password:document.getElementById('pass').value });
  b.disabled=false;
  if(error){ er.textContent='فشل الدخول: '+error.message; er.style.display='block'; return; }
  enterApp(data.session);
}
async function signOut(){ if(channel){sb.removeChannel(channel);channel=null;} await sb.auth.signOut(); showLogin(); }
function showLogin(){ document.getElementById('appShell').style.display='none'; document.getElementById('login').style.display='flex'; }
function enterApp(session){
  document.getElementById('login').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.getElementById('meName').childNodes[0].nodeValue = (session.user.email||'مستخدم').split('@')[0];
  loadAll(); subscribe();
}

/* ===== تحميل كل البيانات مرّة واحدة (بالتوازي) ===== */
async function loadAll(){
  showSkeleton();
  const tables = Object.keys(DB);
  const res = await Promise.all(tables.map(function(t){ return sb.from(t).select('*'); }));
  res.forEach(function(r,i){ DB[tables[i]] = r.data || []; });
  go(route);
}
function subscribe(){
  if(channel) return;
  channel = sb.channel('dsi-all');
  Object.keys(DB).forEach(function(t){
    channel.on('postgres_changes',{event:'*',schema:'public',table:t}, function(){ clearTimeout(_rt); _rt=setTimeout(loadAll,500); });
  });
  channel.subscribe();
}

const PAGES={dashboard:pDashboard,students:pStudents,groups:pGroups,trainers:pTrainers,courses:pCourses,calendar:pCalendar,reports:pReports,printouts:pPrintouts,lookups:pLookups,search:pSearch,users:pUsers,settings:pSettings};
function go(r){
  route=r; const fn=PAGES[r]||pDashboard; const c=document.getElementById('content');
  c.innerHTML='<div class="pg active">'+banner()+fn()+'</div>'; paint(c);
  document.querySelectorAll('#nav a').forEach(function(a){a.classList.toggle('active',a.getAttribute('data-route')===r);});
  c.scrollTop=0;
}
function banner(){ return '<div class="connbar">'+svg('check')+' متصل بقاعدة البيانات (Supabase) — '+DB.students.length+' طالب · تحديث لحظي</div>'; }

/* ===== أدوات ===== */
function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function ini(n){return String(n||'؟').trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('');}
function head(t,s,a){return '<div class="h"><div><h2>'+t+'</h2><div class="sub">'+s+'</div></div>'+(a||'')+'</div>';}
function stat(ic,v,l,g){return '<div class="s'+(g?' g':'')+'"><div class="si">'+svg(ic,18)+'</div><div><div class="v">'+v+'</div><div class="l">'+l+'</div></div></div>';}
function emptyc(m){return '<div class="panel"><div class="empty">'+svg('layers')+'<div style="margin-top:10px">'+(m||'لا توجد بيانات')+'</div></div></div>';}
function tagBadge(t){var c=(t==='نشطة'||t==='جارٍ'||t==='نشط')?'background:rgba(28,114,147,.12);color:#1c7293':(t==='منتهية'||t==='منتهٍ')?'background:#eef1f6;color:#6b7787':'background:rgba(212,163,115,.18);color:#b07a44';return '<span class="badge" style="'+c+'">'+esc(t)+'</span>';}

/* ===== جدول عام: بحث + ترقيم محلي ===== */
function listTable(entity, cols){
  const st=ui[entity]; const all=DB[entity];
  const q=st.q.toLowerCase();
  const rows = !q ? all : all.filter(function(o){ return cols.some(function(c){ return String(o[c.k]||'').toLowerCase().indexOf(q)>=0; }); });
  const pages=Math.max(1,Math.ceil(rows.length/PAGE)); if(st.page>pages)st.page=pages;
  const start=(st.page-1)*PAGE; const slice=rows.slice(start,start+PAGE);
  const thead=cols.map(function(c){return '<th>'+c.t+'</th>';}).join('')+'<th>إجراءات</th>';
  const body = slice.length ? slice.map(function(o,i){
    const tds=cols.map(function(c){ return '<td>'+(c.r?c.r(o):esc(o[c.k]||'—'))+'</td>'; }).join('');
    const acts='<td><div class="rowacts"><span class="iconbtn" title="تعديل" onclick="openForm(\''+entity+'\',\''+esc(o.id)+'\')">'+svg('pen')+'</span><span class="iconbtn danger" title="حذف" onclick="delRow(\''+entity+'\',\''+esc(o.id)+'\')">'+svg('trash')+'</span></div></td>';
    return '<tr>'+tds+acts+'</tr>';
  }).join('') : '<tr><td colspan="'+(cols.length+1)+'" style="text-align:center;color:var(--muted);padding:34px">لا توجد نتائج</td></tr>';
  const pager='<div class="pager2"><div class="pgi">عرض '+(rows.length?start+1:0)+'–'+Math.min(start+PAGE,rows.length)+' من '+rows.length+'</div><div class="pgb">'+
    '<button class="pgx" '+(st.page<=1?'disabled':'')+' onclick="pg(\''+entity+'\','+(st.page-1)+')">السابق</button>'+
    pgWin(st.page,pages).map(function(p){return p==='...'?'<span style="color:var(--muted);padding:0 4px">…</span>':'<button class="pgn'+(p===st.page?' active':'')+'" onclick="pg(\''+entity+'\','+p+')">'+p+'</button>';}).join('')+
    '<button class="pgx" '+(st.page>=pages?'disabled':'')+' onclick="pg(\''+entity+'\','+(st.page+1)+')">التالي</button></div></div>';
  const tb='<div class="tablewrap"><div class="tablescroll"><table class="tbl"><thead><tr>'+thead+'</tr></thead><tbody>'+body+'</tbody></table></div></div>';
  const bar='<div class="toolbar"><div class="searchbox">'+svg('search',16)+'<input value="'+esc(st.q)+'" placeholder="بحث..." oninput="srch(\''+entity+'\',this.value)"></div></div>';
  return bar+tb+pager;
}
function pgWin(cur,total){const o=[];if(total<=7){for(let i=1;i<=total;i++)o.push(i);return o;}o.push(1);let s=Math.max(2,cur-1),e=Math.min(total-1,cur+1);if(cur<=3){s=2;e=4;}if(cur>=total-2){s=total-3;e=total-1;}if(s>2)o.push('...');for(let i=s;i<=e;i++)o.push(i);if(e<total-1)o.push('...');o.push(total);return o;}
function srch(ent,v){ui[ent].q=v.trim();ui[ent].page=1;go(route);}
function pg(ent,p){const rows=DB[ent];ui[ent].page=p;go(route);window.scrollTo({top:0,behavior:'smooth'});}

function pDashboard(){
  const S=DB.students,T=DB.trainers,C=DB.courses,R=DB.course_runs;
  const active=R.filter(function(r){return r.status==='جارٍ'||r.status==='قادم';}).length;
  const kpis='<div class="kpis">'+
    '<div class="kpi g1 klink" onclick="go(\'students\')"><div class="kr"><div class="ic">'+svg('students',20)+'</div></div><div class="v">'+S.length+'</div><div class="l">إجمالي الطلاب</div><div class="spark"></div></div>'+
    '<div class="kpi g2 klink" onclick="go(\'courses\')"><div class="kr"><div class="ic">'+svg('courses',20)+'</div></div><div class="v">'+C.length+'</div><div class="l">الدورات</div><div class="spark"></div></div>'+
    '<div class="kpi g3 klink" onclick="go(\'trainers\')"><div class="kr"><div class="ic">'+svg('trainers',20)+'</div></div><div class="v">'+T.length+'</div><div class="l">المدرّبون</div><div class="spark"></div></div>'+
    '<div class="kpi g4 klink" onclick="go(\'calendar\')"><div class="kr"><div class="ic">'+svg('calendarFull',20)+'</div></div><div class="v">'+active+'</div><div class="l">انعقادات نشطة</div><div class="spark"></div></div></div>';
  // توزيع الطلاب حسب المجموعة
  const gmap={}; S.forEach(function(s){var g=s.group||'(بدون)';gmap[g]=(gmap[g]||0)+1;});
  const gk=Object.keys(gmap).sort(); const gmax=Math.max(1,...gk.map(function(k){return gmap[k];}));
  const gbars=gk.length?'<div class="hbars">'+gk.map(function(k){return '<div class="hb"><div class="nm">'+esc(k)+'</div><div class="track"><div class="fill" style="width:'+(gmap[k]/gmax*100)+'%"></div></div><div class="val">'+gmap[k]+'</div></div>';}).join('')+'</div>':'<div class="empty">لا توجد بيانات</div>';
  // توزيع حسب التخصص (أعلى 6)
  const mmap={}; S.forEach(function(s){if(s.major){mmap[s.major]=(mmap[s.major]||0)+1;}});
  const mk=Object.keys(mmap).sort(function(a,b){return mmap[b]-mmap[a];}).slice(0,6); const mmax=Math.max(1,...mk.map(function(k){return mmap[k];}));
  const mbars=mk.length?'<div class="hbars">'+mk.map(function(k){return '<div class="hb"><div class="nm">'+esc(k)+'</div><div class="track"><div class="fill" style="width:'+(mmap[k]/mmax*100)+'%;background:var(--gold)"></div></div><div class="val">'+mmap[k]+'</div></div>';}).join('')+'</div>':'<div class="empty">—</div>';
  const grid='<div class="grid2"><div class="panel"><div class="ph">الطلاب حسب المجموعة</div>'+gbars+'</div><div class="panel"><div class="ph">أعلى التخصصات</div>'+mbars+'</div></div>';
  return head('لوحة التحكم','نظرة عامة على النظام')+kpis+grid;
}
function pStudents(){

function pGroups(){
  const cnt={}; DB.students.forEach(function(s){var g=s.group||'';if(g)cnt[g]=(cnt[g]||0)+1;});
  const cards=DB.groups.length?'<div class="grid3">'+DB.groups.map(function(g){return '<div class="panel gcard"><div style="display:flex;align-items:center;gap:10px"><span style="color:var(--green)">'+svg('groups',20)+'</span><b style="flex:1">'+esc(g.name)+'</b>'+tagBadge(g.status||'نشطة')+'</div>'+(g.course?'<div style="color:var(--muted);font-size:.82rem;margin:8px 0">'+svg('book',14)+' '+esc(g.course)+'</div>':'')+'<div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px;margin-top:8px"><span style="font-size:.82rem;color:var(--muted)">طلاب بهذا الاسم</span><b style="color:var(--green);font-size:1.05rem">'+(cnt[g.name]||0)+'</b></div><div class="rowacts" style="margin-top:8px"><span class="iconbtn" onclick="openForm(\'groups\',\''+esc(g.id)+'\')">'+svg('pen')+'</span><span class="iconbtn danger" onclick="delRow(\'groups\',\''+esc(g.id)+'\')">'+svg('trash')+'</span></div></div>';}).join('')+'</div>':emptyc('لا توجد مجموعات معرّفة. ملاحظة: مجموعات الطلاب الحالية ('+Object.keys(cnt).sort().join('، ')+') تأتي من حقل «المجموعة» في الطلاب.');
  return head('المجموعات','إدارة المجموعات','<button class="btnG" onclick="openForm(\'groups\')">'+svg('plus',16)+' مجموعة جديدة</button>')+
    '<div class="statline">'+stat('groups',DB.groups.length,'مجموعات معرّفة')+stat('students',Object.keys(cnt).length,'مجموعات الطلاب',true)+'</div>'+cards;
}
function pCalendar(){
  const R=DB.course_runs;
  const list=R.length?'<div class="panel"><div class="ph">الانعقادات</div>'+R.map(function(r){return '<div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)"><span style="color:var(--green)">'+svg('calendarFull',18)+'</span><div style="flex:1"><b>'+esc(r.course||'—')+'</b><div style="font-size:.78rem;color:var(--muted)">'+esc(r.start_date||'')+(r.end_date?' ← '+esc(r.end_date):'')+(r.trainer?' · '+esc(r.trainer):'')+' · '+esc(r.participants||0)+' مشارك</div></div>'+tagBadge(r.status||'قادم')+'<span class="iconbtn" style="margin-inline-start:8px" onclick="openForm(\'course_runs\',\''+esc(r.id)+'\')">'+svg('pen')+'</span><span class="iconbtn danger" onclick="delRow(\'course_runs\',\''+esc(r.id)+'\')">'+svg('trash')+'</span></div>';}).join('')+'</div>':emptyc('لا توجد انعقادات — أضف أول انعقاد');
  return head('التقويم والانعقادات','جدول الانعقادات التدريبية','<button class="btnG" onclick="openForm(\'course_runs\')">'+svg('plus',16)+' انعقاد جديد</button>')+
    '<div class="statline">'+stat('calendarFull',R.length,'إجمالي الانعقادات')+stat('clock',R.filter(function(r){return r.status==='جارٍ';}).length,'جارية الآن',true)+'</div>'+list;
}
function pReports(){
  const S=DB.students;
  function dist(key,color){var m={};S.forEach(function(s){if(s[key]){m[s[key]]=(m[s[key]]||0)+1;}});var k=Object.keys(m).sort(function(a,b){return m[b]-m[a];}).slice(0,8);var mx=Math.max(1,...k.map(function(x){return m[x];}));return k.length?'<div class="hbars">'+k.map(function(x){return '<div class="hb"><div class="nm">'+esc(x)+'</div><div class="track"><div class="fill" style="width:'+(m[x]/mx*100)+'%'+(color?';background:'+color:'')+'"></div></div><div class="val">'+m[x]+'</div></div>';}).join('')+'</div>':'<div class="empty">—</div>';}
  return head('التقارير','إحصاءات من البيانات الحقيقية','<button class="expbtn" onclick="exportCSV()">'+svg('export',15)+' تصدير الطلاب CSV</button>')+
    '<div class="statline">'+stat('students',S.length,'إجمالي الطلاب')+stat('groups',new Set(S.map(function(s){return s.group;}).filter(Boolean)).size,'المجموعات',true)+stat('cap',S.filter(function(s){return String(s.gender).indexOf('أنث')>=0;}).length,'الإناث')+stat('person',S.filter(function(s){return s.gender==='ذكر';}).length,'الذكور')+'</div>'+
    '<div class="grid2"><div class="panel"><div class="ph">حسب التخصص</div>'+dist('major')+'</div><div class="panel"><div class="ph">حسب السنة الدراسية</div>'+dist('year','var(--gold)')+'</div></div>'+
    '<div class="grid2"><div class="panel"><div class="ph">حسب المجموعة</div>'+dist('group')+'</div><div class="panel"><div class="ph">حسب مكان الترشيح</div>'+dist('place','var(--gold)')+'</div></div>';
}
function pLookups(){
  const cats=['الأقسام','التخصصات','أماكن الترشيح'];
  const byCat={}; DB.lookups.forEach(function(l){(byCat[l.category]=byCat[l.category]||[]).push(l);});
  const cards='<div class="grid3">'+cats.map(function(cat){var items=byCat[cat]||[];return '<div class="panel"><div class="ph">'+cat+' <button class="iconbtn" style="margin-inline-start:auto" onclick="openLookup(\''+cat+'\')">'+svg('plus')+'</button></div>'+(items.length?items.map(function(l){return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:.85rem"><span style="color:var(--green-l)">'+svg('layers',15)+'</span>'+esc(l.value)+'<span class="iconbtn danger" style="margin-inline-start:auto" onclick="delRow(\'lookups\',\''+esc(l.id)+'\')">'+svg('trash')+'</span></div>';}).join(''):'<div class="empty" style="padding:18px">لا عناصر</div>')+'</div>';}).join('')+'</div>';
  return head('القوائم والتصنيفات','إدارة الأقسام والتخصصات وأماكن الترشيح')+cards;
}
function pSearch(){
  const q=(document.getElementById('topSearch')&&document.getElementById('topSearch').value||'').trim().toLowerCase();
  if(!q) return head('البحث الشامل','اكتب في شريط البحث بالأعلى ثم Enter')+emptyc('لا يوجد بحث');
  function find(arr,keys){return arr.filter(function(o){return keys.some(function(k){return String(o[k]||'').toLowerCase().indexOf(q)>=0;});}).slice(0,8);}
  const st=find(DB.students,['name','id','major','group','place']),tr=find(DB.trainers,['name','specialization','phone']),co=find(DB.courses,['name','code']);
  function blk(title,rows,icon,sub){return rows.length?'<div class="panel"><div class="ph">'+title+' ('+rows.length+')</div>'+rows.map(function(o){return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)"><span class="av2">'+esc(ini(o.name))+'</span><div style="flex:1"><b style="font-size:.86rem">'+esc(o.name)+'</b><div style="font-size:.76rem;color:var(--muted)">'+esc(sub(o))+'</div></div></div>';}).join('')+'</div>':'';}
  const out=blk('الطلاب',st,'students',function(o){return (o.major||'')+' · '+(o.group||'');})+blk('المدرّبون',tr,'trainers',function(o){return o.specialization||'';})+blk('الدورات',co,'courses',function(o){return o.code||'';});
  return head('البحث الشامل','نتائج: '+q,'')+(out||emptyc('لا نتائج مطابقة'));
}
function pPrintouts(){return head('المطبوعات','نماذج قابلة للطباعة')+'<div class="grid3">'+[['شهادة إتمام','cap'],['كشف الطلاب','students'],['كشف حضور','printouts'],['كشف درجات','check'],['بطاقة متدرّب','person'],['إعلان دورة','megaphone']].map(function(p){return '<div class="panel" style="text-align:center;cursor:pointer" onclick="window.print()"><div style="color:var(--green);margin:8px auto">'+svg(p[1],32)+'</div><b>'+p[0]+'</b><div style="color:var(--muted);font-size:.78rem;margin-top:6px">اضغط للطباعة</div></div>';}).join('')+'</div>';}
function pUsers(){return head('المستخدمون والصلاحيات','إدارة الحسابات')+'<div class="panel"><div class="ph">إدارة المستخدمين</div><p style="color:var(--muted);font-size:.88rem;line-height:1.9">تُدار حسابات الدخول من لوحة Supabase: <b style="color:var(--ink)">Authentication ▸ Users</b> (إضافة/تعطيل/تغيير كلمة المرور). جميع المستخدمين المُصادَقين لهم صلاحية كاملة حاليًا عبر سياسات RLS — ويمكن لاحقًا تقييدها (مدير يكتب/الباقي يقرأ).</p></div>';}
function pSettings(){return head('الإعدادات','إعدادات النظام')+'<div class="grid2"><div class="panel"><div class="ph">مصدر البيانات</div><p style="color:var(--muted);font-size:.86rem;line-height:1.9">قاعدة البيانات: <bdi dir="ltr">Supabase (PostgreSQL)</bdi><br>الحالة: <b style="color:#1c7293">متصل</b><br>السجلات: '+DB.students.length+' طالب · '+DB.trainers.length+' مدرّب · '+DB.courses.length+' دورة</p></div><div class="panel"><div class="ph">الأداء</div><p style="color:var(--muted);font-size:.86rem;line-height:1.9">جلب واحد عند الدخول ثم بحث وترقيم محلي فوري، مع تحديث لحظي بين المستخدمين.</p></div></div>';}

/* ===== CRUD ===== */
function field(f,val){
  const [k,label,type]=f;
  if(type==='bool') return '<div class="fld"><label>'+label+'</label><select data-f="'+k+'" style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font-family:var(--font)"><option value="false"'+(val?'':' selected')+'>لا</option><option value="true"'+(val?' selected':'')+'>نعم</option></select></div>';
  const it = type==='date'?'date':(type==='number'?'number':'text');
  return '<div class="fld"><label>'+label+'</label><input type="'+it+'" data-f="'+k+'" value="'+esc(val==null?'':val)+'"></div>';
}
function openForm(entity,id){
  const def=ENT[entity]; const rec = id ? DB[entity].find(function(x){return String(x.id)===String(id);}) : {};
  window._edit={entity:entity,id:id||null};
  const body=def.fields.map(function(f){
    var val=rec?rec[f[0]]:''; var dis=(f[0]==='id'&&id)?true:false;
    var h=field(f,val); if(dis)h=h.replace('<input','<input disabled');
    return f[2]==='date'||f[0]==='major'||f[0]==='specialization'?'<div class="full">'+h+'</div>':h;
  }).join('');
  const bd=document.getElementById('backdrop');
  bd.innerHTML='<form class="modalcard" onsubmit="saveForm(event)"><div class="modalhd"><b>'+(id?'تعديل ':'إضافة ')+def.title+'</b><span class="iconbtn" onclick="closeForm()">'+svg('x')+'</span></div><div class="modalbody">'+body+'</div><div class="modalft"><button class="btnG" type="submit">'+svg('check',16)+' حفظ</button><button class="btnGhost" type="button" onclick="closeForm()">إلغاء</button></div></form>';
  bd.style.display='flex'; paint(bd);
}
function openLookup(cat){
  window._edit={entity:'lookups',id:null};
  const bd=document.getElementById('backdrop');
  bd.innerHTML='<form class="modalcard" onsubmit="saveForm(event)"><div class="modalhd"><b>إضافة إلى: '+cat+'</b><span class="iconbtn" onclick="closeForm()">'+svg('x')+'</span></div><div class="modalbody"><input type="hidden" data-f="category" value="'+esc(cat)+'"><div class="fld full"><label>القيمة</label><input data-f="value"></div></div><div class="modalft"><button class="btnG" type="submit">'+svg('check',16)+' حفظ</button><button class="btnGhost" type="button" onclick="closeForm()">إلغاء</button></div></form>';
  bd.style.display='flex'; paint(bd);
}
function closeForm(){document.getElementById('backdrop').style.display='none';document.getElementById('backdrop').innerHTML='';}
async function saveForm(ev){
  ev.preventDefault();
  const {entity,id}=window._edit; const def=ENT[entity];
  const rec={}; document.querySelectorAll('#backdrop [data-f]').forEach(function(el){
    var k=el.getAttribute('data-f'); var v=el.value;
    var fdef=(def.fields.find(function(f){return f[0]===k;})||[])[2];
    if(fdef==='bool') v=(v==='true');
    else if(fdef==='number') v=(v===''?null:Number(v));
    else if(fdef==='date') v=(v===''?null:v);
    else v=(v===''?(k==='name'?'':null):v);
    rec[k]=v;
  });
  // للكيانات ذات المعرّف التلقائي: لا نرسل id فارغًا عند الإضافة
  if(!def.textPk && (!id)) delete rec.id;
  let error;
  if(id){ ({error}=await sb.from(def.table).update(rec).eq('id',id)); }
  else  { ({error}=await sb.from(def.table).insert([rec])); }
  if(error){ alert('تعذّر الحفظ: '+error.message); return; }
  closeForm(); await loadAll();
}
async function delRow(entity,id){
  if(!confirm('حذف هذا العنصر نهائيًا؟')) return;
  const {error}=await sb.from(ENT[entity].table).delete().eq('id',id);
  if(error){ alert('تعذّر الحذف: '+error.message); return; }
  await loadAll();
}
function exportCSV(){
  const cols=['id','name','gender','phone','major','year','place','group','last_eval'];
  const csv=[cols].concat(DB.students.map(function(s){return cols.map(function(c){return s[c]||'';});})).map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));a.download='students.csv';a.click();
}
function toggleTheme(){var d=!document.documentElement.classList.contains('dark');document.documentElement.classList.toggle('dark',d);try{localStorage.setItem('dsi-theme',d?'dark':'light');}catch(e){}}
try{if(localStorage.getItem('dsi-theme')==='dark')document.documentElement.classList.add('dark');}catch(e){}
