<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام إدارة الدورات التدريبية</title>
<link rel="stylesheet" href="assets/shell.css" />
<link rel="stylesheet" href="assets/login.css" />
<link rel="stylesheet" href="assets/pages.css" />
<style>
  #appShell{display:none}
  .pg{display:none}
  .pg.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav a{cursor:pointer}
  table.tbl{width:100%;border-collapse:collapse;font-size:.86rem}
  table.tbl th{text-align:inherit;color:var(--muted);font-weight:700;font-size:.74rem;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.tbl tbody tr:hover{background:rgba(28,114,147,.04)}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.74rem;font-weight:700}
  .av2{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--green-l),var(--green));color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;margin-inline-end:8px}
  .cellname{display:flex;align-items:center}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;color:var(--muted)}
  .iconbtn:hover{color:var(--green);border-color:var(--green-l)}
  .iconbtn.danger:hover{color:#c0432e;border-color:#e6a99e}
  .rowacts{display:flex;gap:6px}
  .connbar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;margin-bottom:14px;font-size:.82rem;font-weight:700}
  .connbar.live{background:rgba(28,114,147,.10);color:#1c7293;border:1px solid rgba(28,114,147,.28)}
  .connbar.demo{background:rgba(212,163,115,.14);color:#b07a44;border:1px solid rgba(212,163,115,.38)}
  .connbar svg{width:15px;height:15px;flex:none}
  .empty{text-align:center;color:var(--muted);padding:44px 16px}
  .empty svg{width:34px;height:34px;opacity:.45}
  .backdrop{position:fixed;inset:0;background:rgba(11,19,43,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
  .modalcard{background:var(--card);color:var(--ink);border-radius:16px;width:min(560px,100%);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modalhd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);font-size:1rem}
  .modalbody{padding:16px 18px;overflow:auto}
  .modalft{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
  .mlbl{display:block;margin:10px 0 5px;color:var(--muted);font-size:.8rem;font-weight:700}
  .minp{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font-family:var(--font)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lgp" id="login">
  <img class="lg-wm" src="assets/logo-white.png" alt>
  <div class="lg-lang" style="cursor:pointer" title="Switch to English" onclick="toggleLang()"><span id="lglang"><b>ع</b> | EN</span></div>
  <div class="lg-wrap">
    <div class="lg-card">
      <div class="lg-top">
        <div class="lg-ring"><img src="assets/logo-white.png" alt></div>
        <h1>نظام إدارة الدورات التدريبية</h1>
        <div class="lg-min">إعداد وتطوير القادة</div>
      </div>
      <label class="lg-lbl">اسم المستخدم</label>
      <div class="lg-field">
        <span class="lg-ic" data-ic="person"></span>
        <input type="text" id="u" placeholder="أدخل اسم المستخدم" value="admin" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <label class="lg-lbl">كلمة المرور</label>
      <div class="lg-field">
        <span class="lg-ic" data-ic="lock"></span>
        <span class="lg-ic lg-eye" data-ic="eye" onclick="var p=document.getElementById('p');p.type=p.type==='password'?'text':'password'"></span>
        <input type="password" id="p" placeholder="أدخل كلمة المرور" value="123456" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="lg-btn" onclick="doLogin()"><span data-ic="login"></span> تسجيل الدخول</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
<div class="app" id="app">
  <aside class="side">
    <button class="collapse" title="طيّ / فتح القائمة" onclick="document.getElementById('app').classList.toggle('collapsed')"><span data-ic="chev"></span></button>
    <div class="brandrow">
      <img src="assets/logo-white.png" alt>
      <div class="t">نظام الدورات<span>إعداد وتطوير القادة</span></div>
    </div>
    <nav class="nav" id="nav">
      <a data-route="dashboard" onclick="go('dashboard')"><span data-ic="dashboard"></span> <span class="nt">لوحة التحكم</span></a>
      <div class="lab">الإدارة</div>
      <a data-route="students" onclick="go('students')"><span data-ic="students"></span> <span class="nt">الطلاب</span></a>
      <a data-route="groups" onclick="go('groups')"><span data-ic="groups"></span> <span class="nt">المجموعات</span></a>
      <a data-route="trainers" onclick="go('trainers')"><span data-ic="trainers"></span> <span class="nt">المدرّبون</span></a>
      <a data-route="courses" onclick="go('courses')"><span data-ic="courses"></span> <span class="nt">الدورات</span></a>
      <div class="lab">أدوات</div>
      <a data-route="calendar" onclick="go('calendar')"><span data-ic="calendarFull"></span> <span class="nt">التقويم</span></a>
      <a data-route="reports" onclick="go('reports')"><span data-ic="chart"></span> <span class="nt">التقارير</span></a>
      <a data-route="printouts" onclick="go('printouts')"><span data-ic="printouts"></span> <span class="nt">المطبوعات</span></a>
      <a data-route="lookups" onclick="go('lookups')"><span data-ic="layers"></span> <span class="nt">القوائم والتصنيفات</span></a>
      <a data-route="search" onclick="go('search')"><span data-ic="search"></span> <span class="nt">البحث الشامل</span></a>
      <a data-route="users" onclick="go('users')"><span data-ic="users"></span> <span class="nt">المستخدمون والصلاحيات</span></a>
      <a data-route="settings" onclick="go('settings')"><span data-ic="settings"></span> <span class="nt">الإعدادات</span></a>
    </nav>
    <div class="me">
      <div class="av"></div>
      <div class="nm">Baker Tarabin<span>مدير النظام</span></div>
      <span style="margin-inline-start:auto;cursor:pointer;color:#9fb3a8;display:flex" title="تسجيل الخروج" onclick="logout()"><span data-ic="login"></span></span>
    </div>
  </aside>

  <main class="main">
    <header class="top">
      <div class="search" title="Ctrl+K"><span data-ic="search"></span><input placeholder="ابحث عن طالب، دورة، مدرّب..." onkeydown="if(event.key==='Enter'){go('search')}"></div>
      <div class="tools">
        <span class="pill" style="cursor:pointer" title="Switch to English" onclick="toggleLang()"><span data-ic="globe"></span><span id="pilllang"><b>ع</b> | EN</span></span>
        <span class="ico bell" onclick="toggleNotif()"><span data-ic="bell"></span></span>
        <span class="ico" title="تبديل المظهر" onclick="toggleTheme()"><span data-ic="sun"></span></span>
      </div>
      <div class="notifpanel" id="notif" style="display:none;top:56px;left:14px;right:auto">
        <div class="nh"><b>الإشعارات</b></div>
        <div class="nlist" id="nlist"></div>
        <div class="nfoot"><a onclick="toggleNotif()">إغلاق</a></div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>
</div>

<script src="assets/shell.js"></script>
<script>
const IC={
 dashboard:'<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
 students:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>',
 groups:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
 trainers:'<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>',
 courses:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
 printouts:'<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',
 search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
 users:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>',
 settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
 globe:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20"/>',
 bell:'<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
 sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/>',
 chev:'<path d="m9 18 6-6-6-6"/>',
 x:'<path d="M18 6 6 18M6 6l12 12"/>', plus:'<path d="M12 5v14M5 12h14"/>',
 eye:'<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
 pen:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>',
 trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
 export:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
 person:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
 lock:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
 login:'<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/>',
 calendarFull:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
 chart:'<path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>',
 layers:'<path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/>',
 cap:'<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>',
 megaphone:'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
 key:'<circle cx="7.5" cy="15.5" r="4.5"/><path d="m10.7 12.3 8.3-8.3 2 2-2 2 1.5 1.5-2.5 2.5-1.5-1.5-2.3 2.3"/>',
 check:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
 book:'<path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'
};
function svg(name,size){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"'+(size?' width="'+size+'" height="'+size+'"':'')+'>'+(IC[name]||'')+'</svg>';}
function paintIcons(scope){(scope||document).querySelectorAll('[data-ic]').forEach(function(e){e.innerHTML=svg(e.getAttribute('data-ic'),e.getAttribute('data-sz'));});}

/* ===== Google Sheets link (ضع رابط /exec في ENDPOINT لإعادة الربط) ===== */
const CONFIG = {
  ENDPOINT: 'https://script.google.com/macros/s/AKfycbyL1NHX-eSiAfCBH1GY1qNxYBvnXrRGv-MSlSDRwLWhZHJotmQss9pDIlJi-X3Zc-eBHQ/exec',
  TOKEN:    'Passport123'  // يجب أن يطابق الرمز في Code.gs
};
let DB=null, liveStudents=null, studentTabName='', lastErr='';
const FIELD={ id:'معرف الطالب', name:'الاسم', gender:'الجنس', phone:'رقم الواتساب', major:'التخصص', year:'السنة الدراسية', place:'مكان الترشيح', group:'المجموعة', lastEval:'تاريخ اخر تقييم' };
const FORM_FIELDS=[FIELD.name,FIELD.id,FIELD.gender,FIELD.phone,FIELD.major,FIELD.year,FIELD.place,FIELD.group];

function jsonp(params){return new Promise(function(res,rej){
  if(!CONFIG.ENDPOINT) return rej('no-endpoint');
  var cb='__cb'+Math.random().toString(36).slice(2);
  var s=document.createElement('script');
  var u=new URL(CONFIG.ENDPOINT);
  var all=Object.assign({},params,{token:CONFIG.TOKEN,callback:cb});
  Object.keys(all).forEach(function(k){ u.searchParams.set(k, typeof all[k]==='object'?JSON.stringify(all[k]):all[k]); });
  window[cb]=function(d){ try{delete window[cb];}catch(e){} s.remove(); res(d); };
  s.onerror=function(){ try{delete window[cb];}catch(e){} s.remove(); rej('network'); };
  s.src=u.toString(); document.body.appendChild(s);
  setTimeout(function(){ if(window[cb]){ try{delete window[cb];}catch(e){} s.remove(); rej('timeout'); } },20000);
});}
function pickStudentTab(tabs){ return tabs.find(function(t){return t.headers.indexOf(FIELD.id)>=0 && t.headers.indexOf(FIELD.name)>=0;}) || tabs[0]; }
function mapStudents(tab){ var H=tab.headers; var m={}; Object.keys(FIELD).forEach(function(k){ m[k]=H.indexOf(FIELD[k]); });
  return tab.rows.map(function(r){ var o={}; Object.keys(m).forEach(function(k){ o[k]=m[k]>=0?(r[m[k]]||''):''; }); o.raw={}; H.forEach(function(h,i){ if(h) o.raw[h]=r[i]||''; }); return o; }); }
async function loadLive(){ lastErr=''; try{ var d=await jsonp({action:'read'}); if(d&&d.ok&&d.tabs){ DB=d; var t=pickStudentTab(d.tabs); studentTabName=t.name; liveStudents=mapStudents(t); return true; } lastErr=(d&&d.error)?String(d.error):'استجابة غير متوقعة'; }catch(e){ lastErr=String(e); console.warn('live load failed:',e); } return false; }
function isLive(){ return !!liveStudents; }
function banner(){ return isLive()
  ? '<div class="connbar live">'+svg('check')+' متصل بالشيت: '+studentTabName+' — '+liveStudents.length+' سجل</div>'
  : '<div class="connbar demo">'+svg('layers')+' غير متصل بالشيت — ضع رابط /exec في CONFIG.ENDPOINT لعرض بياناتك'+(lastErr?(' (السبب: '+lastErr+')'):'')+'</div>'; }

function modal(title, bodyHtml, onSave){ closeModal();
  var wrap=document.createElement('div'); wrap.className='backdrop'; wrap.id='modalHost';
  wrap.innerHTML='<div class="modalcard"><div class="modalhd"><b>'+title+'</b><span class="iconbtn" data-ic="x" onclick="closeModal()"></span></div><div class="modalbody">'+bodyHtml+'</div><div class="modalft">'+(onSave?'<button class="btnG" id="mSave"><span data-ic="check"></span> حفظ</button>':'')+'<button class="btnGhost" onclick="closeModal()">إغلاق</button></div></div>';
  document.body.appendChild(wrap); paintIcons(wrap);
  if(onSave) document.getElementById('mSave').onclick=function(){ onSave(wrap); };
  wrap.addEventListener('mousedown',function(e){ if(e.target===wrap) closeModal(); });
}
function closeModal(){ var m=document.getElementById('modalHost'); if(m) m.remove(); }
function field(name,val){ return '<label class="mlbl">'+name+'</label><input class="minp" data-f="'+name+'" value="'+String(val||'').replace(/"/g,'&quot;')+'">'; }
function studentForm(s){ return FORM_FIELDS.map(function(f){ return field(f, s&&s.raw?s.raw[f]:''); }).join(''); }
function collectForm(wrap){ var o={}; wrap.querySelectorAll('[data-f]').forEach(function(i){ o[i.getAttribute('data-f')]=i.value; }); return o; }

async function addStudent(){ if(!isLive()) return toast('غير متصل بالشيت','err');
  modal('طالب جديد', studentForm(null), async function(wrap){ var o=collectForm(wrap);
    try{ var d=await jsonp({action:'add',sheet:studentTabName,row:o}); if(d&&d.ok){ toast('تمت إضافة الطالب'); closeModal(); await loadLive(); go('students'); } else toast((d&&d.error)||'تعذّرت الإضافة','err'); }catch(e){ toast('خطأ في الاتصال','err'); } }); }
async function editStudent(id){ var s=liveStudents.find(function(x){return String(x.id)===String(id);});
  modal('تعديل بيانات الطالب', studentForm(s), async function(wrap){ var o=collectForm(wrap);
    try{ var d=await jsonp({action:'update',sheet:studentTabName,id:id,row:o}); if(d&&d.ok){ toast('تم حفظ التعديل'); closeModal(); await loadLive(); go('students'); } else toast((d&&d.error)||'تعذّر التعديل','err'); }catch(e){ toast('خطأ في الاتصال','err'); } }); }
async function delStudent(id){ if(!confirm('حذف هذا السجل نهائيًا من الشيت؟')) return;
  try{ var d=await jsonp({action:'delete',sheet:studentTabName,id:id}); if(d&&d.ok){ toast('تم الحذف'); await loadLive(); go('students'); } else toast((d&&d.error)||'تعذّر الحذف','err'); }catch(e){ toast('خطأ في الاتصال','err'); } }
function viewStudent(id){ var s=liveStudents.find(function(x){return String(x.id)===String(id);}); if(!s) return;
  var rows=Object.keys(s.raw).filter(function(k){return String(s.raw[k]).trim()!=='';}).map(function(k){return '<tr><td style="color:var(--muted);white-space:nowrap">'+k+'</td><td>'+s.raw[k]+'</td></tr>';}).join('');
  modal('بطاقة الطالب — '+(s.name||''), '<table class="tbl">'+(rows||'<tr><td>لا توجد بيانات</td></tr>')+'</table>'); }
function filterStudents(q){ q=(q||'').trim(); document.querySelectorAll('#stuTable tbody tr').forEach(function(tr){ tr.style.display = tr.getAttribute('data-k').indexOf(q)>=0?'':'none'; }); }
function exportStudents(){ if(!isLive()) return; var t=DB.tabs.find(function(x){return x.name===studentTabName;});
  var csv=[t.headers].concat(t.rows).map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'})); a.download=studentTabName+'.csv'; a.click(); }

/* ---------- helpers ---------- */
function initials(n){ return String(n||'').split(' ').slice(0,2).map(function(w){return w[0];}).join(''); }
function badge(t,s){ return '<span class="badge" style="'+s+'">'+t+'</span>'; }
function statusBadge(t){ return badge(t,'background:rgba(28,114,147,.12);color:#1c7293'); }
function stat(ic,v,l,g){ return '<div class="s'+(g?' g':'')+'"><div class="si">'+svg(ic,18)+'</div><div><div class="v">'+v+'</div><div class="l">'+l+'</div></div></div>'; }
function pageHead(t,sub,actions){ return '<div class="h"><div><h2>'+t+'</h2><div class="sub">'+sub+'</div></div>'+(actions||'')+'</div>'; }
function emptyState(msg){ return '<div class="panel"><div class="empty">'+svg('layers')+'<div style="margin-top:12px;font-size:.9rem">'+(msg||'لا توجد بيانات لعرضها')+'</div></div></div>'; }

/* ---------- pages (empty until connected to the sheet) ---------- */
function pDashboard(){
  var totalStu = isLive()?liveStudents.length:0;
  var kpis='<div class="kpis">'+
    '<div class="kpi g1 klink" onclick="go(\'students\')"><div class="kr"><div class="ic">'+svg('students',20)+'</div></div><div class="v">'+totalStu+'</div><div class="l">إجمالي الطلاب</div><div class="spark"></div></div>'+
    '<div class="kpi g2 klink" onclick="go(\'courses\')"><div class="kr"><div class="ic">'+svg('courses',20)+'</div></div><div class="v">0</div><div class="l">دورات نشطة</div><div class="spark"></div></div>'+
    '<div class="kpi g3 klink" onclick="go(\'trainers\')"><div class="kr"><div class="ic">'+svg('trainers',20)+'</div></div><div class="v">0</div><div class="l">المدرّبون</div><div class="spark"></div></div>'+
    '<div class="kpi g4 klink"><div class="kr"><div class="ic">'+svg('chart',20)+'</div></div><div class="v">—</div><div class="l">نسبة النجاح العامة</div><div class="spark"></div></div></div>';
  return pageHead('لوحة التحكم','نظرة عامة على النظام')+kpis+emptyState('لا توجد بيانات لعرضها — اربط الشيت لعرض بياناتك الحقيقية');
}
function pStudents(){
  if(isLive()){
    var L=liveStudents;
    var fem=L.filter(function(s){return String(s.gender).indexOf('أنث')>=0;}).length;
    var groupsN=(new Set(L.map(function(s){return s.group;}).filter(Boolean))).size;
    var evald=L.filter(function(s){return String(s.lastEval).trim()!=='';}).length;
    function esc(v){return String(v||'').replace(/"/g,'&quot;');}
    var rows=L.map(function(s){
      var key=[s.name,s.id,s.major,s.group,s.year,s.place].join(' ').toLowerCase();
      var a='<div class="rowacts"><span class="iconbtn" title="عرض" onclick="viewStudent(\''+esc(s.id)+'\')"><span data-ic="eye"></span></span><span class="iconbtn" title="تعديل" onclick="editStudent(\''+esc(s.id)+'\')"><span data-ic="pen"></span></span><span class="iconbtn danger" title="حذف" onclick="delStudent(\''+esc(s.id)+'\')"><span data-ic="trash"></span></span></div>';
      return '<tr data-k="'+esc(key)+'"><td><div class="cellname"><span class="av2">'+initials(s.name||'؟')+'</span>'+(s.name||'')+'</div></td><td>'+s.id+'</td><td>'+(s.gender||'')+'</td><td><bdi dir="ltr">'+(s.phone||'')+'</bdi></td><td>'+(s.major||'')+'</td><td>'+(s.year||'')+'</td><td>'+(s.place||'—')+'</td><td>'+(s.group||'')+'</td><td>'+(s.lastEval||'—')+'</td><td>'+a+'</td></tr>';
    }).join('');
    var head=['الطالب','المعرّف','الجنس','رقم الواتساب','التخصص','السنة','مكان الترشيح','المجموعة','آخر تقييم','إجراءات'];
    return pageHead('الطلاب','قاعدة بيانات الطلاب — مرتبطة مباشرةً بـ Google Sheets','<button class="btnG" onclick="addStudent()">'+svg('plus',16)+' طالب جديد</button>')+
      '<div class="statline">'+stat('students',L.length,'إجمالي السجلات')+stat('person',fem,'إناث')+stat('groups',groupsN,'المجموعات',true)+stat('check',evald,'لديهم تقييم')+'</div>'+
      '<div class="toolbar"><div class="searchbox">'+svg('search',16)+'<input placeholder="بحث في الطلاب..." oninput="filterStudents(this.value.toLowerCase())"></div><button class="expbtn" onclick="exportStudents()">'+svg('export',15)+' تصدير</button></div>'+
      '<div class="tablewrap"><div class="tablescroll"><table class="tbl" id="stuTable"><thead><tr>'+head.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }
  return pageHead('الطلاب','إدارة بيانات الطلاب وتنظيمهم ضمن المجموعات')+
    '<div class="statline">'+stat('students','0','إجمالي الطلاب')+stat('person','0','إناث')+stat('groups','0','المجموعات',true)+stat('check','0','لديهم تقييم')+'</div>'+
    emptyState('لا يوجد طلاب — اربط الشيت لعرض البيانات');
}
function pTrainers(){
  return pageHead('المدرّبون','إدارة بيانات المدرّبين وأجورهم')+
    '<div class="statline">'+stat('trainers','0','إجمالي المدرّبين')+stat('cap','0','يمكنهم السفر')+stat('check','0','دربوا معنا',true)+'</div>'+
    emptyState('لا توجد بيانات للمدرّبين');
}
function pCourses(){
  return pageHead('الدورات','عرّف الدورة مرة واحدة، ثم أنشئ لها انعقادات متعددة')+
    '<div class="statline">'+stat('courses','0','دورات معرّفة')+stat('book','0','انعقادات جارية')+stat('check','0','انعقادات منتهية',true)+'</div>'+
    emptyState('لا توجد دورات معرّفة');
}
function pGroups(){
  if(isLive()){
    var map={}; liveStudents.forEach(function(s){ var g=s.group||'(بدون مجموعة)'; map[g]=(map[g]||0)+1; });
    var keys=Object.keys(map).sort();
    if(!keys.length) return pageHead('المجموعات','المجموعات مشتقّة من عمود «المجموعة» في الشيت','')+emptyState('لا توجد مجموعات');
    var cards='<div class="grid3">'+keys.map(function(g){return '<div class="panel gcard"><div style="display:flex;align-items:center;gap:10px"><span style="color:var(--green)">'+svg('groups',20)+'</span><b style="flex:1">'+g+'</b>'+statusBadge('نشطة')+'</div><div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px;margin-top:10px"><span style="font-size:.82rem;color:var(--muted)">عدد الطلاب</span><b style="color:var(--green);font-size:1.1rem">'+map[g]+'</b></div></div>';}).join('')+'</div>';
    return pageHead('المجموعات','المجموعات مشتقّة مباشرةً من عمود «المجموعة» في الشيت','')+
      '<div class="statline">'+stat('groups',keys.length,'عدد المجموعات')+stat('students',liveStudents.length,'إجمالي الطلاب',true)+'</div>'+cards;
  }
  return pageHead('المجموعات','تنظيم الطلاب في دفعات ومجموعات تدريبية')+
    '<div class="statline">'+stat('groups','0','إجمالي المجموعات')+stat('students','0','إجمالي الطلاب',true)+'</div>'+
    emptyState('لا توجد مجموعات');
}
function pCalendar(){
  var days=['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
  var cells='';for(var d=1;d<=30;d++){cells+='<div style="min-height:74px;border:1px solid var(--line);border-radius:10px;padding:6px;background:var(--card)"><div style="font-size:.78rem;color:var(--muted)">'+d+'</div></div>';}
  return pageHead('التقويم','جدول الانعقادات والجلسات التدريبية')+
    '<div class="panel"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px">'+days.map(function(x){return '<div style="text-align:center;font-size:.76rem;font-weight:700;color:var(--muted)">'+x+'</div>';}).join('')+'</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">'+cells+'</div></div>';
}
function pReports(){
  return pageHead('التقارير','مؤشرات الأداء ومعدلات النجاح حسب الدورة')+
    '<div class="statline">'+stat('cap','0','متدرّب مكتمل')+stat('check','0','متوسط النجاح',true)+stat('book','0','ساعة تدريبية')+'</div>'+
    emptyState('لا توجد بيانات لإنشاء التقارير');
}
function pUsers(){
  return pageHead('المستخدمون والصلاحيات','إدارة حسابات المستخدمين وأدوارهم')+
    '<div class="statline">'+stat('users','0','المستخدمون')+stat('key','0','أدوار')+stat('check','0','حسابات نشطة',true)+'</div>'+
    emptyState('لا يوجد مستخدمون');
}
function pSettings(){
  function f(l,v){ return '<div style="margin-bottom:16px"><label style="display:block;margin-bottom:6px;color:var(--muted);font-size:.82rem">'+l+'</label><input class="minp" value="'+v+'"></div>'; }
  return pageHead('الإعدادات','إعدادات النظام العامة')+
    '<div class="grid2"><div class="panel"><div class="ph">بيانات الجهة</div>'+f('اسم الجهة','إعداد وتطوير القادة')+f('السنة التدريبية الحالية','')+'<button class="btnG">'+svg('check',16)+' حفظ التغييرات</button></div>'+
    '<div class="panel"><div class="ph">مصدر البيانات</div><p style="color:var(--muted);font-size:.85rem;line-height:1.9">المصدر: <bdi dir="ltr">Google Sheets</bdi><br>الحالة: '+(isLive()?'متصل':'غير متصل')+'</p></div></div>';
}
function pPrintouts(){ return pageHead('المطبوعات','نماذج الشهادات والإعلانات وكشوف الحضور')+'<div class="grid3">'+[['شهادة إتمام','cap'],['إعلان دورة','megaphone'],['كشف حضور','printouts'],['كشف درجات','check'],['بطاقة متدرّب','person'],['خطاب ترشيح','book']].map(function(p){return '<div class="panel" style="text-align:center;cursor:pointer" onclick="toast(\'فتح نموذج: '+p[0]+'\')"><div style="color:var(--green);margin:8px auto">'+svg(p[1],34)+'</div><b>'+p[0]+'</b><div style="color:var(--muted);font-size:.78rem;margin-top:6px">اضغط للمعاينة</div></div>';}).join('')+'</div>'; }
function pLookups(){ return pageHead('القوائم والتصنيفات','إدارة الأقسام والتخصصات وأماكن الترشيح')+'<div class="grid3">'+['الأقسام','التخصصات','أماكن الترشيح'].map(function(t){return '<div class="panel"><div class="ph">'+t+' <button class="iconbtn" style="margin-inline-start:auto">'+svg('plus',15)+'</button></div><div class="empty" style="padding:24px">لا توجد عناصر</div></div>';}).join('')+'</div>'; }
function pSearch(){
  return pageHead('البحث الشامل','نتائج البحث في الطلاب والدورات والمدرّبين')+
    '<div class="panel"><div class="searchbox" style="margin-bottom:14px">'+svg('search',16)+'<input placeholder="ابحث..."></div><div class="empty">'+svg('search')+'<div style="margin-top:12px;font-size:.9rem">لا توجد نتائج</div></div></div>';
}
var PAGES={dashboard:pDashboard,students:pStudents,trainers:pTrainers,courses:pCourses,groups:pGroups,calendar:pCalendar,reports:pReports,users:pUsers,settings:pSettings,printouts:pPrintouts,lookups:pLookups,search:pSearch};

/* ---------- router / shell ---------- */
function go(route){
  var fn=PAGES[route]||pDashboard;
  var c=document.getElementById('content');
  var withBanner=['dashboard','students','groups'].indexOf(route)>=0;
  c.innerHTML='<div class="pg active">'+(withBanner?banner():'')+fn()+'</div>';
  paintIcons(c);
  document.querySelectorAll('#nav a').forEach(function(a){ a.classList.toggle('active',a.getAttribute('data-route')===route); });
  c.scrollTop=0;
}
async function doLogin(){
  document.getElementById('login').style.display='none';
  document.getElementById('appShell').style.display='block';
  go('dashboard');
  var ok=await loadLive();
  go('dashboard');
  if(CONFIG.ENDPOINT) setTimeout(function(){ toast(ok?('تم الاتصال بالشيت — '+liveStudents.length+' سجل'):('تعذّر الاتصال: '+(lastErr||'غير معروف')), ok?'':'err'); },250);
}
function logout(){ document.getElementById('appShell').style.display='none'; document.getElementById('login').style.display='flex'; }
function toggleNotif(){ var n=document.getElementById('notif'); n.style.display=n.style.display==='none'?'block':'none'; }
function toggleLang(){ var ltr=document.documentElement.getAttribute('dir')==='rtl'; if(typeof applyDir==='function') applyDir(ltr?'ltr':'rtl'); else document.documentElement.setAttribute('dir',ltr?'ltr':'rtl');
  var lbl=ltr?'AR | <b>EN</b>':'<b>ع</b> | EN'; var p=document.getElementById('pilllang'); if(p)p.innerHTML=lbl; var l=document.getElementById('lglang'); if(l)l.innerHTML=lbl;
  toast(ltr?'Switched to English (layout)':'تم التبديل إلى العربية'); }

document.getElementById('nlist').innerHTML='<div class="empty" style="padding:26px 10px;font-size:.82rem">لا توجد إشعارات</div>';

paintIcons(document);
</script>
</body>
</html>
